version: 2
updates:
  # Keep the GitHub Actions used by CI current (and patched).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep runtime + dev dependencies current; group dev-deps to cut PR noise.
  # NOTE: this is a Bun project — use the `bun` ecosystem (not `npm`) so
  # Dependabot updates bun.lock alongside package.json. The `npm` ecosystem
  # leaves bun.lock stale, which breaks `bun install --frozen-lockfile` in CI.
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
